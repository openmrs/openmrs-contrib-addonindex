name: Build with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        platform: [ ubuntu-latest ]
        java-version: [ 11 ]

    runs-on: ${{ matrix.platform }}
    env:
      PLATFORM: ${{ matrix.platform }}
      JAVA_VERSION: ${{ matrix.java-version }}

    steps:
      - uses: actions/checkout@vde0fac2e4500dabe0009e67214ff5f5447ce83dd  # 6.0.2
      - name: Set up JDK
        uses: actions/setup-java@vbe666c2fcd27ec809703dec50e508c2fdc7f6654  # 5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: 'maven'
      - name: Build with Maven
        run: mvn verify --batch-mode --file pom.xml
